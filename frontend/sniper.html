<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Sniper — MAXIA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a14;--bg2:#0c1222;--text:#e4e4e7;--muted:#a1a1aa;--cyan:#00e5ff;--purple:#7c3aed;--green:#22c55e;--rose:#f43f5e;--gold:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:40px 20px}
a{color:var(--cyan);text-decoration:none}
.back{position:fixed;top:20px;left:20px;font-size:14px;color:var(--muted)}
.container{max-width:900px;margin:0 auto}
h1{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;margin-bottom:8px;margin-top:40px}
.sub{color:var(--muted);margin-bottom:24px;font-size:15px}
.stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat-box{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 20px;min-width:120px}
.stat-val{font-size:22px;font-weight:700;color:var(--cyan)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:end}
.filters label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.filters input{padding:8px 12px;background:#0c1222;border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit}
.filters button{padding:8px 20px;background:var(--cyan);color:#060a14;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit}
.token-list{display:flex;flex-direction:column;gap:8px}
.token-row{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:12px;transition:border-color .2s;text-decoration:none;color:var(--text)}
.token-row:hover{border-color:rgba(0,229,255,.3)}
.token-name{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.token-name strong{color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:13px}
.token-meta{display:flex;gap:16px;align-items:center;flex-shrink:0}
.token-boosts{font-size:13px;color:var(--gold);font-weight:600}
.token-chain{font-size:12px;color:var(--muted);background:rgba(255,255,255,.04);padding:3px 8px;border-radius:6px}
.token-link{font-size:13px;padding:6px 14px;border:1px solid rgba(0,229,255,.3);border-radius:8px;color:var(--cyan);flex-shrink:0}
.empty{text-align:center;padding:40px;color:var(--muted)}
.live-dot{display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:600px){.token-meta{flex-direction:column;gap:4px;align-items:end}}
</style>
</head>
<body>
<a href="/" class="back">&larr; Back to MAXIA</a>
<div class="container">
<h1><span class="live-dot"></span>Token Sniper</h1>
<p class="sub" id="sub-text">New tokens detected in real-time every 30 seconds.</p>

<div class="stats">
  <div class="stat-box"><div class="stat-val" id="s-detected">-</div><div class="stat-lbl">Detected</div></div>
  <div class="stat-box"><div class="stat-val" id="s-scans">-</div><div class="stat-lbl">Scans</div></div>
  <div class="stat-box"><div class="stat-val" id="s-source">-</div><div class="stat-lbl">Source</div></div>
  <div class="stat-box"><div class="stat-val" id="s-status">-</div><div class="stat-lbl">Status</div></div>
</div>

<div class="filters">
  <div><label>Min Boosts</label><input type="number" id="f-boosts" value="0" style="width:80px"></div>
  <div><label>Keyword</label><input type="text" id="f-kw" placeholder="e.g. trump" style="width:140px"></div>
  <div><label>&nbsp;</label><button onclick="loadTokens()">Filter</button></div>
</div>

<div class="token-list" id="tokens">
  <div class="empty">Loading tokens...</div>
</div>
</div>

<script>
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''}

async function loadStats(){
  try{
    var r=await fetch('/api/sniper/stats');var d=await r.json();
    document.getElementById('s-detected').textContent=d.total_detected||0;
    document.getElementById('s-scans').textContent=d.total_scans||0;
    document.getElementById('s-source').textContent=d.source||'?';
    var statusEl=document.getElementById('s-status');
    statusEl.textContent=d.status||'?';
    statusEl.style.color=d.status==='active'?'var(--green)':'var(--gold)';
    document.getElementById('sub-text').textContent='Source: '+(d.source||'scanning')+' — every '+d.scan_interval_s+'s';
  }catch(e){}
}

async function loadTokens(){
  var boosts=document.getElementById('f-boosts').value||0;
  var kw=document.getElementById('f-kw').value||'';
  var el=document.getElementById('tokens');

  try{
    var url='/api/sniper/new-tokens?min_boosts='+boosts+'&limit=30';
    if(kw)url+='&keyword='+encodeURIComponent(kw);
    var r=await fetch(url);var d=await r.json();
    var tokens=d.tokens||[];

    if(!tokens.length){
      el.innerHTML='<div class="empty">No tokens found. The scanner runs every 30s — new tokens will appear automatically.</div>';
      return;
    }

    el.innerHTML=tokens.map(function(t){
      var link=t.url||('https://dexscreener.com/'+(t.chain||'solana')+'/'+t.mint);
      var boostsTxt=t.boosts>0?t.boosts+' boosts':'new';
      return '<a href="'+esc(link)+'" target="_blank" class="token-row">'+
        '<div class="token-name"><strong>'+esc(t.symbol)+'</strong> '+esc(t.name||t.description||t.mint.substring(0,16)+'...')+'</div>'+
        '<div class="token-meta">'+
          '<div class="token-boosts">'+boostsTxt+'</div>'+
          '<div class="token-chain">'+esc(t.chain||'solana')+'</div>'+
          (t.market_cap_usd>0?'<div style="font-size:13px">$'+(t.market_cap_usd/1000).toFixed(1)+'K</div>':'')+
        '</div>'+
      '</a>';
    }).join('');
  }catch(e){el.innerHTML='<div class="empty" style="color:var(--rose)">Error loading tokens</div>';}
}

loadStats();
loadTokens();
setInterval(function(){loadStats();loadTokens();},30000);
</script>
</body>
</html>
