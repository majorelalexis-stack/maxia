<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAXIA Trading</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#060a14;--bg2:#0c1222;--card:rgba(255,255,255,.05);--text:#e4e4e7;--muted:#a1a1aa;--cyan:#00e5ff;--green:#22c55e;--rose:#f43f5e;--purple:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 16px 80px}
.header{padding:16px 0;text-align:center;border-bottom:1px solid rgba(255,255,255,.06)}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:13px;color:var(--muted);margin-top:4px}
.tabs{display:flex;gap:4px;padding:12px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;background:var(--card);color:var(--muted);border:none;cursor:pointer;white-space:nowrap;font-family:inherit}
.tab.active{background:var(--cyan);color:#060a14}
.panel{display:none;padding:16px 0}
.panel.active{display:block}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--bg2);border-radius:12px;margin-bottom:8px;border:1px solid rgba(255,255,255,.04)}
.price-sym{font-weight:700;font-size:16px}
.price-val{font-size:16px;font-weight:600;color:var(--cyan)}
.price-src{font-size:11px;color:var(--muted)}
.section-title{font-size:15px;font-weight:700;margin:20px 0 10px;color:var(--muted)}
.yield-row{display:flex;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-radius:12px;margin-bottom:6px;border:1px solid rgba(255,255,255,.04)}
.yield-proto{font-weight:600;font-size:14px}
.yield-apy{color:var(--green);font-weight:700}
.yield-chain{font-size:12px;color:var(--muted)}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;margin-top:12px;font-family:inherit}
.btn:active{opacity:.8}
.btn-outline{background:transparent;border:1px solid var(--cyan);color:var(--cyan)}
.input-group{margin-bottom:12px}
.input-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.input-group select,.input-group input{width:100%;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--text);font-size:15px;font-family:inherit}
.msg{padding:14px;border-radius:12px;margin-top:12px;font-size:14px}
.msg-ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--green)}
.msg-err{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);color:var(--rose)}
.trending-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border-radius:10px;margin-bottom:6px;border:1px solid rgba(255,255,255,.04)}
.trending-sym{font-weight:600;font-size:14px;color:var(--cyan)}
.trending-mc{font-size:13px;color:var(--muted)}
.empty{text-align:center;padding:32px;color:var(--muted)}
</style>
</head>
<body>

<div class="header">
  <h1>MAXIA Trading</h1>
  <p id="user-greeting">Loading...</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('prices')">Prices</button>
  <button class="tab" onclick="showTab('swap')">Swap</button>
  <button class="tab" onclick="showTab('yields')">DeFi</button>
  <button class="tab" onclick="showTab('trending')">Trending</button>
  <button class="tab" onclick="showTab('buy')">Buy</button>
</div>

<!-- PRICES -->
<div class="panel active" id="p-prices">
  <div id="prices-list"><div class="empty">Loading prices...</div></div>
</div>

<!-- SWAP -->
<div class="panel" id="p-swap">
  <div class="input-group"><label>From</label><select id="sw-from"><option>USDC</option><option>SOL</option><option>ETH</option></select></div>
  <div class="input-group"><label>To</label><select id="sw-to"><option>SOL</option><option>ETH</option><option>BTC</option><option>USDC</option></select></div>
  <div class="input-group"><label>Amount</label><input type="number" id="sw-amt" value="10" min="0.01"></div>
  <button class="btn" onclick="getQuote()">Get Quote</button>
  <div id="swap-result"></div>
</div>

<!-- YIELDS -->
<div class="panel" id="p-yields">
  <div class="section-title">Top USDC Yields</div>
  <div id="yields-list"><div class="empty">Loading yields...</div></div>
</div>

<!-- TRENDING -->
<div class="panel" id="p-trending">
  <div class="section-title">Trending on pump.fun</div>
  <div id="trending-list"><div class="empty">Loading...</div></div>
</div>

<!-- BUY -->
<div class="panel" id="p-buy">
  <div class="section-title">Buy Crypto with Card</div>
  <div class="input-group"><label>Token</label><select id="buy-token"><option>SOL</option><option>ETH</option><option>BTC</option><option>USDC</option></select></div>
  <div class="input-group"><label>Amount (EUR)</label><input type="number" id="buy-amt" value="50" min="10"></div>
  <div class="input-group"><label>Your Wallet</label><input type="text" id="buy-wallet" placeholder="Solana or EVM address"></div>
  <button class="btn" onclick="buyNow()">Buy Now</button>
  <div id="buy-result"></div>
</div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
var BASE = '';

// Init Telegram WebApp
if(tg){
  tg.ready();
  tg.expand();
  var user = tg.initDataUnsafe && tg.initDataUnsafe.user;
  if(user){
    document.getElementById('user-greeting').textContent = 'Hello, ' + (user.first_name || 'trader') + '!';
  }
  // Apply Telegram theme
  if(tg.themeParams){
    document.body.style.background = tg.themeParams.bg_color || '#060a14';
    document.body.style.color = tg.themeParams.text_color || '#e4e4e7';
  }
} else {
  document.getElementById('user-greeting').textContent = 'MAXIA Trading — Open in Telegram for full experience';
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

// Tabs
function showTab(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.getElementById('p-'+id).classList.add('active');
  event.target.classList.add('active');
}

// Prices — fetch from /oracle/price/live/{symbol}
async function loadPrices(){
  var el = document.getElementById('prices-list');
  var tokens = ['SOL','ETH','BTC','USDC','JUP','BONK','WIF','RENDER','AVAX','MATIC'];
  try{
    var fetches = tokens.map(function(t){
      return fetch('/oracle/price/live/'+t).then(function(r){return r.json()}).then(function(d){return {symbol:t,price:d.price||0,source:d.source||'oracle'}}).catch(function(){return {symbol:t,price:0,source:'error'}});
    });
    var results = await Promise.all(fetches);
    var html = '';
    results.forEach(function(r){
      if(r.price > 0){
        html += '<div class="price-row"><div><div class="price-sym">'+r.symbol+'</div><div class="price-src">'+r.source+'</div></div><div class="price-val">$'+r.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:4})+'</div></div>';
      }
    });
    el.innerHTML = html || '<div class="empty">No prices available</div>';
  }catch(e){el.innerHTML='<div class="empty">Error loading prices</div>';}
}

// Swap quote
async function getQuote(){
  var from = document.getElementById('sw-from').value;
  var to = document.getElementById('sw-to').value;
  var amt = parseFloat(document.getElementById('sw-amt').value);
  var el = document.getElementById('swap-result');
  if(from===to){el.innerHTML='<div class="msg msg-err">Select different tokens</div>';return;}
  el.innerHTML='<div class="msg msg-ok">Getting quote...</div>';
  try{
    var r = await fetch('/api/public/swap/quote?from='+from+'&to='+to+'&amount='+amt);
    var d = await r.json();
    if(d.output_amount){
      el.innerHTML='<div class="msg msg-ok"><b>'+amt+' '+from+' → '+d.output_amount.toFixed(6)+' '+to+'</b><br>Rate: 1 '+from+' = '+d.rate.toFixed(6)+' '+to+'<br>Fee: '+(d.commission_pct||0)+'%</div>';
    } else {
      el.innerHTML='<div class="msg msg-err">'+(d.error||d.detail||'Quote unavailable')+'</div>';
    }
  }catch(e){el.innerHTML='<div class="msg msg-err">Connection error</div>';}
}

// Yields
async function loadYields(){
  var el = document.getElementById('yields-list');
  try{
    var r = await fetch('/api/public/defi/best-yield?asset=USDC&limit=8');
    var d = await r.json();
    var yields = d.yields || d.opportunities || [];
    if(!yields.length){el.innerHTML='<div class="empty">No yields available</div>';return;}
    el.innerHTML = yields.map(function(y){
      return '<div class="yield-row"><div><div class="yield-proto">'+esc(y.protocol||'?')+'</div><div class="yield-chain">'+esc(y.chain||'?')+'</div></div><div class="yield-apy">'+((y.apy||0).toFixed(2))+'%</div></div>';
    }).join('');
  }catch(e){el.innerHTML='<div class="empty">Error loading yields</div>';}
}

// Trending
async function loadTrending(){
  var el = document.getElementById('trending-list');
  try{
    var r = await fetch('/api/sniper/new-tokens?limit=15');
    var d = await r.json();
    var tokens = d.tokens || [];
    if(!tokens.length){el.innerHTML='<div class="empty">No trending tokens yet — scanner runs every 30s</div>';return;}
    el.innerHTML = tokens.map(function(t){
      var mc = t.market_cap_usd>=1000?'$'+(t.market_cap_usd/1000).toFixed(1)+'K':'$'+t.market_cap_usd.toFixed(0);
      return '<a href="https://pump.fun/'+t.mint+'" target="_blank" class="trending-row"><div class="trending-sym">'+esc(t.symbol)+'</div><div class="trending-mc">'+mc+'</div></a>';
    }).join('');
  }catch(e){el.innerHTML='<div class="empty">Error loading trending</div>';}
}

// Buy
async function buyNow(){
  var token = document.getElementById('buy-token').value;
  var amt = parseFloat(document.getElementById('buy-amt').value);
  var wallet = document.getElementById('buy-wallet').value.trim();
  var el = document.getElementById('buy-result');
  if(!wallet||wallet.length<10){el.innerHTML='<div class="msg msg-err">Enter your wallet address</div>';return;}
  el.innerHTML='<div class="msg msg-ok">Finding provider...</div>';
  try{
    var r = await fetch('/api/fiat/onramp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({crypto:token,fiat_amount:amt,fiat_currency:'EUR',wallet_address:wallet})});
    var d = await r.json();
    if(d.url){
      el.innerHTML='<a href="'+d.url+'" target="_blank" class="btn" style="margin-top:12px">Buy '+token+' via '+d.provider+' →</a><div style="font-size:12px;color:var(--muted);margin-top:8px">Fees: '+d.estimated_fees+'</div>';
      if(tg) tg.openLink(d.url);
    } else {
      el.innerHTML='<div class="msg msg-err">'+(d.detail||'Error')+'</div>';
    }
  }catch(e){el.innerHTML='<div class="msg msg-err">Connection error</div>';}
}

// Load all data
loadPrices();
loadYields();
loadTrending();
setInterval(loadPrices, 10000);
</script>
</body>
</html>
