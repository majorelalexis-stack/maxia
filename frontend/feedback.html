<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXIA — Feedback &amp; Bug Report</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060a14;--bg2:#0c1222;--text:#e4e4e7;--muted:#a1a1aa;--muted2:#52525b;--cyan:#00e5ff;--green:#22c55e;--red:#f43f5e;--grad:linear-gradient(135deg,#00e5ff,#7c3aed,#f43f5e)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--cyan);text-decoration:none}
h1,h2{font-family:'Syne',sans-serif}

.topbar{padding:16px 32px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,.04)}
.topbar-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.page{max-width:600px;margin:0 auto;padding:48px 24px}
.page-title{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.page-sub{font-size:15px;color:var(--muted);margin-bottom:32px}

.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.form-select,.form-input,.form-textarea{width:100%;padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .2s;outline:none}
.form-select:focus,.form-input:focus,.form-textarea:focus{border-color:rgba(0,229,255,.3)}
.form-select option{background:#0c1222;color:var(--text)}
.form-textarea{resize:vertical;min-height:120px;line-height:1.6}
.form-hint{font-size:11px;color:var(--muted2);margin-top:4px}

.btn-submit{width:100%;padding:14px;border-radius:12px;background:var(--grad);color:#fff;font-weight:600;font-size:15px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .3s}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,255,.2)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:14px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;display:none;backdrop-filter:blur(12px)}
.toast-ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.toast-err{background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.3);color:var(--red)}

.back-link{display:block;text-align:center;padding:32px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="topbar-logo">MAXIA</a>
</div>

<div class="page">
  <div class="page-title">Feedback <span style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">&amp; Bug Report</span></div>
  <div class="page-sub">Found a bug? Have a suggestion? Let us know. No signup needed.</div>

  <form id="feedback-form" onsubmit="return submitFeedback(event)">
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="fb-category">
        <option value="bug">Bug Report</option>
        <option value="feature">Feature Request</option>
        <option value="ux">UX / Design Issue</option>
        <option value="performance">Performance Issue</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Description *</label>
      <textarea class="form-textarea" id="fb-message" placeholder="Describe the issue or suggestion. Be as specific as possible..." required minlength="10" maxlength="2000"></textarea>
      <div class="form-hint"><span id="char-count">0</span>/2000 characters</div>
    </div>

    <div class="form-group">
      <label class="form-label">Contact (optional)</label>
      <input class="form-input" id="fb-contact" type="text" placeholder="Email, Twitter, or Telegram — so we can follow up" maxlength="200">
    </div>

    <button type="submit" class="btn-submit" id="fb-submit">Submit Feedback</button>
  </form>
</div>

<div class="back-link"><a href="/app">&larr; Back to App</a></div>

<div class="toast toast-ok" id="toast-ok">Thank you! Your feedback has been submitted.</div>
<div class="toast toast-err" id="toast-err">Something went wrong. Please try again.</div>

<script>
document.getElementById('fb-message').addEventListener('input',function(){
  document.getElementById('char-count').textContent=this.value.length;
});

function showToast(id,ms){
  var t=document.getElementById(id);t.style.display='block';
  setTimeout(function(){t.style.display='none';},ms||4000);
}

async function submitFeedback(e){
  e.preventDefault();
  var btn=document.getElementById('fb-submit');
  btn.disabled=true;btn.textContent='Submitting...';

  var payload={
    category:document.getElementById('fb-category').value,
    message:document.getElementById('fb-message').value,
    contact:document.getElementById('fb-contact').value
  };

  try{
    var r=await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(r.ok){
      showToast('toast-ok');
      document.getElementById('feedback-form').reset();
      document.getElementById('char-count').textContent='0';
    }else{
      var d=await r.json().catch(function(){return {};});
      document.getElementById('toast-err').textContent=d.detail||'Something went wrong.';
      showToast('toast-err');
    }
  }catch(err){
    showToast('toast-err');
  }

  btn.disabled=false;btn.textContent='Submit Feedback';
  return false;
}
</script>
</body>
</html>
