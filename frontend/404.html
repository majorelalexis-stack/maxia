<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | MAXIA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080A0F;color:#E0E0E0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.container{max-width:520px;padding:40px 24px}
h1{font-family:'Syne',sans-serif;font-size:6rem;font-weight:700;background:linear-gradient(135deg,#00F0FF,#7B61FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
h2{font-family:'Syne',sans-serif;font-size:1.5rem;margin:16px 0 12px;color:#fff}
p{color:#999;margin-bottom:32px;line-height:1.6}
.btn{display:inline-block;padding:14px 32px;background:linear-gradient(135deg,#00F0FF,#7B61FF);color:#080A0F;font-weight:600;text-decoration:none;border-radius:8px;font-size:1rem;transition:transform .2s}
.btn:hover{transform:translateY(-2px)}
.links{margin-top:24px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.links a{color:#00F0FF;text-decoration:none;font-size:.9rem}
.links a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="/" class="btn">Back to Home</a>
  <div class="links">
    <a href="/app">Dashboard</a>
    <a href="/marketplace">Marketplace</a>
    <a href="/docs">Documentation</a>
    <a href="/forum">Forum</a>
  </div>
</div>
</body>
</html>
