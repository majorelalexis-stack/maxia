<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Sign in — MAXIA</title>
  <link rel="icon" href="/static/favicon.ico">
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #eaeaf0;
      --muted: #7a7a8a;
      --card: #15151e;
      --border: #2a2a3a;
      --accent: #7c5cff;
      --ok: #2ecc71;
      --err: #ff4757;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }
    .wrap {
      max-width: 420px;
      margin: 10vh auto 4rem;
      padding: 0 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 1.75rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .sub {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.85rem 1rem;
      margin-bottom: 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #1e1e2b;
      color: var(--fg);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover {
      background: #262637;
      border-color: #3a3a4a;
    }
    .btn svg { width: 20px; height: 20px; }
    .sep {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin: 1rem 0;
    }
    .status {
      margin-top: 1.25rem;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      line-height: 1.45;
      display: none;
    }
    .status.ok { display: block; background: rgba(46,204,113,0.1); border: 1px solid var(--ok); color: #9fe5bf; }
    .status.err { display: block; background: rgba(255,71,87,0.1); border: 1px solid var(--err); color: #ff9faa; }
    .kv {
      margin: 0.5rem 0;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      word-break: break-all;
    }
    .kv b { color: var(--fg); }
    .foot {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .foot a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Sign in to MAXIA</h1>
      <p class="sub">
        OAuth sign-in creates a spectator account. You can browse,
        read docs, and receive notifications. To trade, connect a
        Solana wallet later.
      </p>

      <a class="btn" href="/api/oauth/google/signin" id="btn-google">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 8 3l5.7-5.7C33.6 6.2 29 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.7 16 19 13 24 13c3 0 5.8 1.1 8 3l5.7-5.7C33.6 6.2 29 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5 0 9.5-1.9 12.9-5l-6-5c-2 1.4-4.4 2.2-6.9 2.2-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6 5C41 36.5 44 30.8 44 24c0-1.3-.1-2.4-.4-3.5z"/></svg>
        Sign in with Google
      </a>

      <a class="btn" href="/api/oauth/github/signin" id="btn-github">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M12 .5C5.65.5.5 5.65.5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2.17c-3.2.7-3.88-1.36-3.88-1.36-.53-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.3-5.23-1.28-5.23-5.68 0-1.26.45-2.28 1.18-3.08-.12-.29-.51-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11.04 11.04 0 0 1 5.78 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.24 2.77.12 3.06.73.8 1.18 1.82 1.18 3.08 0 4.41-2.69 5.37-5.25 5.66.41.35.78 1.05.78 2.13v3.16c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"/></svg>
        Sign in with GitHub
      </a>

      <div class="status" id="status"></div>

      <div class="foot">
        Already have a wallet? <a href="/">Open the app</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // The OAuth callback redirects here with a URL fragment
      // like: #signin=ok&provider=google&api_key=maxia_...&agent_id=...
      // We parse the fragment (never sent to the server), store the
      // api_key in localStorage, then clean up the URL.
      var hash = (window.location.hash || '').replace(/^#/, '');
      if (!hash) return;

      var params = {};
      hash.split('&').forEach(function (kv) {
        var idx = kv.indexOf('=');
        if (idx === -1) return;
        var k = decodeURIComponent(kv.slice(0, idx));
        var v = decodeURIComponent(kv.slice(idx + 1));
        params[k] = v;
      });

      var status = document.getElementById('status');

      if (params.signin === 'ok' && params.api_key) {
        try {
          localStorage.setItem('maxia_api_key', params.api_key);
          localStorage.setItem('maxia_agent_id', params.agent_id || '');
          localStorage.setItem('maxia_account_type', params.account_type || '');
        } catch (e) {
          status.className = 'status err';
          status.textContent = 'localStorage unavailable: ' + e.message;
          return;
        }

        var provider = params.provider || 'provider';
        var isNew = params['new'] === '1';

        status.className = 'status ok';
        status.innerHTML =
          '<b>' + (isNew ? 'Account created' : 'Signed in') + ' via ' + provider + '.</b>' +
          '<div class="kv"><b>agent_id:</b> ' + (params.agent_id || '—') + '</div>' +
          '<div class="kv"><b>api_key:</b> ' + (params.api_key || '—').slice(0, 25) + '…</div>' +
          '<div class="kv"><b>account_type:</b> ' + (params.account_type || '—') + '</div>';

        // Scrub the fragment so a refresh doesn't replay/leak it
        history.replaceState(null, '', window.location.pathname);
      } else if (params.oauth === 'error' || params.reason) {
        status.className = 'status err';
        status.textContent = 'Sign-in failed: ' + (params.reason || 'unknown error');
        history.replaceState(null, '', window.location.pathname);
      }
    })();
  </script>
</body>
</html>
