<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="240" r="180" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.25"/>

  <!-- Inner orbital ring -->
  <ellipse cx="256" cy="240" rx="140" ry="50" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.4" transform="rotate(-20, 256, 240)"/>
  <ellipse cx="256" cy="240" rx="140" ry="50" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.25" transform="rotate(40, 256, 240)"/>

  <!-- Center M lettermark -->
  <text x="256" y="280" text-anchor="middle" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="180" fill="url(#accent)" letter-spacing="-8">M</text>

  <!-- Node dots on orbits -->
  <circle cx="116" cy="210" r="8" fill="#00e5ff"/>
  <circle cx="370" cy="180" r="6" fill="#7c3aed"/>
  <circle cx="320" cy="310" r="7" fill="#f43f5e"/>
  <circle cx="180" cy="300" r="5" fill="#00e5ff" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="256" y="430" text-anchor="middle" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="48" fill="#94a3b8" letter-spacing="12">MAXIA</text>
  <text x="256" y="470" text-anchor="middle" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="28" fill="#64748b" letter-spacing="6">AI MARKETPLACE</text>
</svg>
