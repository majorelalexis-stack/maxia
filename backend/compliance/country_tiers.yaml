# ══════════════════════════════════════════
# CAUTION — accessible with acknowledgment banner
# ══════════════════════════════════════════
# Countries where the legal situation is ambiguous, evolving, or where
# a local tax/enforcement regime exists but crypto services are not
# strictly forbidden. Users get a first-visit modal asking them to
# acknowledge that they are responsible for compliance with local laws.
