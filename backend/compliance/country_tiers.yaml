# ══════════════════════════════════════════
# Feature gates — what each feature requires per tier
# ══════════════════════════════════════════
# These override the legacy `country_filter.is_allowed(feature=...)`
# semantics. Missing feature → fail-safe deny.
feature_gates:
  # Public read-only features (always available except HARD tier)
  discovery:
    hard: deny
    license: allow
    caution: allow
    allowed: allow
    unknown: allow
  docs:
    hard: deny
    license: allow
    caution: allow
    allowed: allow
    unknown: allow
  pricing_data:
    hard: deny
    license: allow
    caution: allow
    allowed: allow
    unknown: allow

  # CASP-regulated features
  trading:
    hard: deny
    license: deny
    caution: allow_with_banner
    allowed: allow
    unknown: deny
  custody:
    hard: deny
    license: deny
    caution: allow_with_banner
    allowed: allow
    unknown: deny
  payment:
    hard: deny
    license: deny
    caution: allow_with_banner
    allowed: allow
    unknown: deny
  withdrawal:
    hard: deny
    license: deny
    caution: allow_with_banner
    allowed: allow
    unknown: deny

  # Outreach features (subject to active solicitation rules)
  marketing:
    hard: deny
    license: deny
    caution: deny  # stricter — no cold outreach to caution zones
    allowed: allow
    unknown: deny
  email_outreach:
    hard: deny
    license: deny
    caution: deny
    allowed: allow
    unknown: deny
