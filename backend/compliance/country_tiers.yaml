# MAXIA country geofencing — 4-tier classification (Plan Tier 1 Global)
#
# Single source of truth for all geofencing decisions across the backend
# and the local CEO missions. Loaded at startup by
# `backend.compliance.country_filter` and hot-reloaded on mtime change.
#
# The legacy 3-tier model (ALLOWED/GEO_BLOCKED/BLOCKED) is preserved
# for API backwards-compat — the new 4-tier model maps as:
#
#     HARD     -> BLOCKED  (sanctions, zero access even to marketing)
#     LICENSE  -> GEO_BLOCKED (trading blocked, marketing/docs allowed)
#     CAUTION  -> ALLOWED with acknowledgment banner
#     ALLOWED  -> ALLOWED (fully open)
#
# Country codes are ISO 3166-1 alpha-2 upper-case.
# Last updated: 2026-04-11

version: 1
last_updated: "2026-04-11"

# ══════════════════════════════════════════
# HARD BLOCK — sanctions, zero access
# ══════════════════════════════════════════
# OFAC SDN + UN Security Council + EU consolidated list + MAXIA ToS.
# These countries get HTTP 451 on ALL routes, including the landing
# page, because US export control (EAR) can apply to pure content
# delivery (North Korea, Iran in particular).
hard:
  - code: CU
    name: Cuba
    reason: "OFAC comprehensive sanctions"
  - code: IR
    name: Iran
    reason: "OFAC comprehensive sanctions + FATF blacklist"
  - code: KP
    name: North Korea
    reason: "UN + OFAC + EU total ban"
  - code: SY
    name: Syria
    reason: "OFAC comprehensive sanctions"
  - code: RU
    name: Russia
    reason: "OFAC + EU + UK sanctions (post-2022)"
  - code: BY
    name: Belarus
    reason: "EU + UK sanctions (Russia support)"
  - code: MM
    name: Myanmar
    reason: "EU sanctions + FATF grey list"
  - code: VE
    name: Venezuela
    reason: "OFAC sectoral sanctions (crypto-specific)"
  - code: AF
    name: Afghanistan
    reason: "OFAC + UN sanctions, Taliban control"
  - code: SD
    name: Sudan
    reason: "OFAC sanctions"
  - code: YE
    name: Yemen
    reason: "OFAC sanctions (Houthi-controlled regions)"
  - code: ZW
    name: Zimbabwe
    reason: "EU restrictive measures"

# ══════════════════════════════════════════
# LICENSE BLOCK — trading blocked, marketing OK
# ══════════════════════════════════════════
# Countries where operating a crypto-asset service requires a license
# that MAXIA does not currently hold. Users can still browse the
# landing page, read blog, access docs, and view the public API (prices,
# marketplace stats) — they just cannot execute trades, hold custody,
# or use any CASP-regulated service.
