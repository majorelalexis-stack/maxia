version: '3.8'

services:
  maxia:
    build: .
    container_name: maxia-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - maxia-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  maxia-data:
    driver: local
